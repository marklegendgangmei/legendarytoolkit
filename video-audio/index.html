<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MP4 to MP3 Converter – Legendary Toolkit</title>
    <!-- Bootstrap 5 + Icons (optional, but used by original xsukax) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== Minimal custom styling to match the original xsukax look ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            color: #1a1a2e;
            padding: 2rem 1rem;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h1, h2, .btn {
            font-family: 'Space Grotesk', monospace;
            letter-spacing: -0.02em;
        }
        .drop-area {
            border: 2px dashed #cbd5e1;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }
        .drop-area.dragover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .btn-convert {
            background: #0f172a;
            color: white;
            border-radius: 60px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-convert:hover {
            background: #1e293b;
            transform: scale(1.02);
        }
        .progress-bar {
            background-color: #3b82f6;
        }
        footer {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="text-center mb-4">
        <span class="badge bg-light text-dark rounded-pill px-3 py-2">⚡ legendarytoolkit.com</span>
        <h1 class="mt-3">MP4 → MP3 Converter</h1>
        <p class="text-secondary">Extract audio from video – no upload, 100% private</p>
    </div>

    <!-- Drop zone -->
    <div id="drop" class="drop-area mb-4">
        <i class="bi bi-cloud-upload fs-1"></i>
        <p class="mt-2 fw-semibold">Click or drag MP4 file here</p>
        <small class="text-muted">Max ~500MB (browser memory limit)</small>
        <input type="file" id="fileInput" accept="video/mp4,.mp4" class="d-none">
    </div>

    <!-- Bitrate selector -->
    <div class="mb-4">
        <label class="form-label fw-semibold">🎵 Audio quality</label>
        <select id="bitrate" class="form-select w-auto">
            <option value="96k">96 kbps (smaller file)</option>
            <option value="128k" selected>128 kbps (balanced)</option>
            <option value="192k">192 kbps (high quality)</option>
            <option value="320k">320 kbps (best)</option>
        </select>
    </div>

    <!-- Buttons -->
    <div class="d-flex gap-3 mb-4">
        <button id="convertBtn" class="btn btn-convert" disabled>⬇️ Convert to MP3</button>
        <button id="cancelBtn" class="btn btn-outline-secondary" disabled>✖ Cancel</button>
    </div>

    <!-- Progress -->
    <div id="progressWrap" class="d-none mb-4">
        <div class="d-flex justify-content-between small mb-1">
            <span id="statusText">Preparing...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress">
            <div id="progressBar" class="progress-bar" style="width:0%"></div>
        </div>
    </div>

    <!-- Result -->
    <div id="result" class="d-none mt-4 pt-3 border-top">
        <h5>✅ Ready</h5>
        <audio id="audioPreview" controls class="w-100 mb-3"></audio>
        <a id="downloadLink" class="btn btn-convert w-100" download>💾 Download MP3</a>
    </div>

    <footer>
        <i class="bi bi-shield-check"></i> Client‑side · No server · Powered by FFmpeg.wasm
    </footer>
</div>

<!-- FFmpeg.wasm (single-threaded version for broader compatibility) -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js"></script>

<script>
    (function() {
        // DOM elements
        const drop = document.getElementById('drop');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const bitrateSelect = document.getElementById('bitrate');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const statusText = document.getElementById('statusText');
        const resultDiv = document.getElementById('result');
        const downloadLink = document.getElementById('downloadLink');
        const audioPreview = document.getElementById('audioPreview');

        let selectedFile = null;
        let ffmpeg = null;
        let isConverting = false;

        // Helper to update drop text
        function updateDropText(text) {
            const p = drop.querySelector('p');
            if (p) p.textContent = text;
        }

        function handleFileSelection(file) {
            if (!file) return;
            if (!file.type.startsWith('video/') && !file.name.toLowerCase().endsWith('.mp4')) {
                if (!confirm('Selected file is not an MP4. Continue anyway?')) return;
            }
            selectedFile = file;
            updateDropText(`📁 ${file.name} (${(file.size / (1024*1024)).toFixed(2)} MB)`);
            convertBtn.disabled = false;
            resultDiv.classList.add('d-none');
            audioPreview.src = '';
            downloadLink.removeAttribute('href');
        }

        // Drag & drop
        drop.addEventListener('click', () => fileInput.click());
        drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
        drop.addEventListener('drop', (e) => {
            e.preventDefault();
            drop.classList.remove('dragover');
            const f = e.dataTransfer.files[0];
            if (f) handleFileSelection(f);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFileSelection(e.target.files[0]);
        });

        // Load FFmpeg
        async function loadFFmpeg() {
            if (ffmpeg && ffmpeg.loaded) return ffmpeg;
            if (typeof window.FFmpeg === 'undefined') {
                throw new Error('FFmpeg library not loaded. Check internet connection.');
            }
            statusText.innerText = '⏳ Loading FFmpeg engine (first time only)...';
            progressWrap.classList.remove('d-none');
            progressBar.style.width = '5%';
            progressPercent.innerText = '5%';

            const { FFmpeg } = window.FFmpeg;
            ffmpeg = new FFmpeg();
            ffmpeg.on('progress', ({ progress }) => {
                const percent = Math.round(progress * 100);
                progressBar.style.width = percent + '%';
                progressPercent.innerText = percent + '%';
                statusText.innerText = `⚙️ Converting... ${percent}%`;
            });
            await ffmpeg.load({
                coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
                wasmURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
            });
            statusText.innerText = '✅ FFmpeg ready.';
            return ffmpeg;
        }

        // Conversion
        async function startConversion() {
            if (!selectedFile) {
                alert('Please select an MP4 file.');
                return;
            }
            if (isConverting) return;

            isConverting = true;
            convertBtn.disabled = true;
            cancelBtn.disabled = false;
            progressWrap.classList.remove('d-none');
            progressBar.style.width = '0%';
            progressPercent.innerText = '0%';
            statusText.innerText = 'Preparing file...';
            resultDiv.classList.add('d-none');

            let aborted = false;
            cancelBtn.onclick = () => {
                aborted = true;
                statusText.innerText = '❌ Cancelled.';
                progressWrap.classList.add('d-none');
                convertBtn.disabled = false;
                cancelBtn.disabled = true;
                isConverting = false;
                if (ffmpeg && ffmpeg.terminate) ffmpeg.terminate();
                ffmpeg = null;
            };

            try {
                const ff = await loadFFmpeg();
                if (aborted) return;

                statusText.innerText = '📂 Writing video to virtual memory...';
                const fileData = new Uint8Array(await selectedFile.arrayBuffer());
                ff.FS('writeFile', 'input.mp4', fileData);

                const bitrate = bitrateSelect.value;
                statusText.innerText = `🎞️ Extracting audio (${bitrate})...`;
                await ff.exec([
                    '-i', 'input.mp4', '-vn', '-ab', bitrate, '-map', 'a', '-y', 'output.mp3'
                ]);

                if (aborted) return;

                statusText.innerText = '📀 Reading MP3 data...';
                const outData = ff.FS('readFile', 'output.mp3');
                const mp3Blob = new Blob([outData.buffer], { type: 'audio/mpeg' });
                const url = URL.createObjectURL(mp3Blob);
                const originalName = selectedFile.name.replace(/\.[^/.]+$/, '') || 'converted';
                downloadLink.href = url;
                downloadLink.download = `${originalName}.mp3`;
                downloadLink.textContent = `💾 Download MP3 (${(mp3Blob.size / 1024).toFixed(1)} KB)`;
                audioPreview.src = url;

                resultDiv.classList.remove('d-none');
                statusText.innerText = '✅ Done! Your MP3 is ready.';
                progressBar.style.width = '100%';
                progressPercent.innerText = '100%';

                ff.FS('unlink', 'input.mp4');
                ff.FS('unlink', 'output.mp3');
            } catch (err) {
                console.error(err);
                statusText.innerText = `❌ Error: ${err.message}`;
                alert('Conversion failed: ' + err.message);
                progressWrap.classList.add('d-none');
            } finally {
                isConverting = false;
                convertBtn.disabled = false;
                cancelBtn.disabled = true;
                cancelBtn.onclick = null;
            }
        }

        convertBtn.addEventListener('click', startConversion);
        convertBtn.disabled = true;
        cancelBtn.disabled = true;
        updateDropText('📂 Drop MP4 file or click');

        // Preload FFmpeg in background
        setTimeout(() => {
            if (!ffmpeg && !isConverting) loadFFmpeg().catch(console.warn);
        }, 2000);

        // ========== AUTO-RESIZING IFRAME HANDLER ==========
        // This reports the page height to the parent (Blogger iframe)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'getHeight') {
                var height = Math.max(
                    document.body.scrollHeight,
                    document.documentElement.scrollHeight,
                    document.body.offsetHeight,
                    document.documentElement.offsetHeight
                );
                event.source.postMessage({ type: 'setHeight', height: height }, '*');
            }
        });
    })();
</script>
</body>
</html>
